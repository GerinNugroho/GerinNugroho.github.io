<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      integrity="sha512-dPXYcDub/aeb08c63jRq/k6GaKccl256JQy/AnOq7CAnEZ9FzSL9wSbcZkMp4R26vBsMLFYH4kQ67/bbV8XaCQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style/style.css" />
    <title>Landing Project</title>
  </head>
  <body>
    <section id="home">
      <div class="home-container">
        <p>Hello World!</p>
        <h1>Landing <span class="accent">Project</span></h1>
        <span class="scrolldown">
          <p class="tooltip">Scroll Down</p>
          <i class="bi bi-arrow-down-circle-fill"></i>
        </span>
      </div>
    </section>
    <section id="project">
      <div class="project-container">
        <div class="project-wrap">
          <div class="project-heading">
            <h2><i class="bi bi-code-slash icon-heading"></i><span class="accent">Project</span></h2>
            <h3>Build Unique Project</h3>
          </div>
          <div class="project-items" id="project-items"></div>
        </div>
      </div>
    </section>
    <section id="contact">
      <div class="contact-container">
        <div class="contact-wrapper">
          <h2><i class="bi bi-envelope-paper icon-heading"></i><span class="accent">Contact</span></h2>
          <form name="Form-Comment">
            <div class="input-item">
              <div class="label-container">
                <label for="Name">Your Name</label>
              </div>
              <input type="text" name="name" id="Name" required />
            </div>
            <div class="input-textarea">
              <div class="label-container">
                <label for="Comment">Comment</label>
              </div>
              <textarea name="comment" id="Comment" cols="70" rows="8" required></textarea>
            </div>
            <button class="btn-send" type="submit"><i class="bi bi-send-fill"></i>Send</button>
            <button class="disabled" type="button">Wait...</button>
          </form>
        </div>
      </div>
    </section>
    <footer>
      <p>Created By Gerin Nugroho</p>
      <div class="footer-wrapper">
        <div class="footer-info">
          <a href="https://github.com/GerinNugroho"><i class="bi bi-github"></i></a>
          <a href="mailto:gerinnugroho17@gmail.com"><i class="bi bi-envelope-at"></i></a>
        </div>
        <a href="#home" class="back-top"><i class="bi bi-arrow-up-circle-fill"></i></a>
      </div>
    </footer>
  </body>
  <script type="module" src="js/script.js"></script>
</html>
